<h1>Task List</h1>

<p>Add Task Button</p>
<p>Delete Task Button</p>
<p>Filter bar here</p>

<table>
    <thead>
        <tr>
            <th>Select</th>
            <th>Id</th>
            <th>Title</th>
            <th>Task Status</th>
            <th>Task Created At</th>
        </tr>
    </thead>
    <tbody>
        @for (task of taskService.tasks(); track task.id) {
        <tr>
            <td><input type="checkbox" /></td>
            <td>{{ task.id }}</td>
            <td>{{ task.title }}</td>
            <td>{{ task.completed ? 'Completed' : 'Pending' }}</td>
            <td>{{ task.createdAt | date }}</td>
        </tr>
        }
    </tbody>
</table>
